<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>牛顿第二定律 - 交互式演示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        body { margin: 0; background: linear-gradient(180deg, #0F172A 0%, #164E63 100%); color: #F8FAFC; }
        #canvas-container { width: 100%; height: 60vh; }
        .panel { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 12px; padding: 20px; }
    </style>
</head>
<body>
    <nav class="p-4" style="background: rgba(15,23,42,0.85); border-bottom: 1px solid rgba(20,184,166,0.3);">
        <h1 class="text-2xl font-bold">牛顿第二定律 F = ma</h1>
    </nav>
    <div id="canvas-container"></div>
    <div class="panel m-4">
        <label>力 (N): <input type="range" id="force" min="1" max="100" value="50"></label>
        <label>质量 (kg): <input type="range" id="mass" min="1" max="50" value="10"></label>
        <p>加速度：<span id="acceleration">5</span> m/s²</p>
    </div>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight * 0.6);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        const geometry = new THREE.BoxGeometry();
        const material = new THREE.MeshStandardMaterial({color: 0x14B8A6});
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);
        
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);
        
        camera.position.z = 5;
        
        function animate() {
            requestAnimationFrame(animate);
            cube.rotation.x += 0.01;
            cube.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();
        
        document.getElementById('force').addEventListener('input', update);
        document.getElementById('mass').addEventListener('input', update);
        function update() {
            const F = parseFloat(document.getElementById('force').value);
            const m = parseFloat(document.getElementById('mass').value);
            document.getElementById('acceleration').textContent = (F/m).toFixed(2);
        }
    </script>
</body>
</html>
